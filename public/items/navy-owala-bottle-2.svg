<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Navy Owala bottle, lid detail showing the owner initials A.C.">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#dde5ef"/>
    </radialGradient>
    <linearGradient id="body2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2742"/>
      <stop offset="45%" stop-color="#234a78"/>
      <stop offset="100%" stop-color="#0c2038"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg2)"/>
  <ellipse cx="400" cy="690" rx="150" ry="26" fill="#0f2742" opacity="0.16"/>

  <!-- lid lifted above the bottle -->
  <g transform="translate(0 -70)">
    <path d="M352 150 q48 -44 96 0" fill="none" stroke="#1c3c63" stroke-width="16" stroke-linecap="round"/>
    <rect x="318" y="150" width="164" height="74" rx="22" fill="#2c5286"/>
  </g>

  <!-- bottle body, open top -->
  <rect x="300" y="250" width="200" height="406" rx="54" fill="url(#body2)"/>
  <ellipse cx="400" cy="256" rx="100" ry="20" fill="#0a1c32"/>
  <rect x="300" y="600" width="200" height="56" rx="40" fill="#0a1c32" opacity="0.55"/>

  <!-- engraved initials label under the lid -->
  <g transform="translate(400 430)">
    <rect x="-78" y="-40" width="156" height="80" rx="16" fill="#ffffff" opacity="0.12"/>
    <rect x="-78" y="-40" width="156" height="80" rx="16" fill="none" stroke="#a9d18e" stroke-width="3" stroke-dasharray="6 6"/>
    <text x="0" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">A.C.</text>
  </g>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#cfe0c2">initials under the lid</text>
</svg>
