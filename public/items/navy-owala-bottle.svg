<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Navy Owala FreeSip water bottle with a yellow lightning-bolt sticker">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#dde5ef"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2742"/>
      <stop offset="42%" stop-color="#1c3c63"/>
      <stop offset="58%" stop-color="#234a78"/>
      <stop offset="100%" stop-color="#0c2038"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16335a"/>
      <stop offset="50%" stop-color="#2c5286"/>
      <stop offset="100%" stop-color="#122a4a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- floor shadow -->
  <ellipse cx="400" cy="690" rx="150" ry="26" fill="#0f2742" opacity="0.16"/>

  <!-- carry loop on the lid -->
  <path d="M352 150 q48 -44 96 0" fill="none" stroke="#1c3c63" stroke-width="16" stroke-linecap="round"/>

  <!-- lid -->
  <rect x="318" y="150" width="164" height="78" rx="22" fill="url(#lid)"/>
  <rect x="318" y="206" width="164" height="20" rx="10" fill="#0c2038" opacity="0.55"/>

  <!-- bottle body -->
  <rect x="300" y="226" width="200" height="430" rx="56" fill="url(#body)"/>
  <!-- soft vertical highlight -->
  <rect x="332" y="250" width="44" height="382" rx="22" fill="url(#shine)"/>
  <!-- base band -->
  <rect x="300" y="600" width="200" height="56" rx="40" fill="#0a1c32" opacity="0.55"/>

  <!-- yellow lightning-bolt sticker -->
  <g transform="translate(400 430)">
    <circle r="74" fill="#ffd43b"/>
    <circle r="74" fill="none" stroke="#e9b008" stroke-width="5"/>
    <path d="M14 -42 L -26 6 L 2 6 L -14 42 L 30 -10 L 0 -10 Z"
          fill="#16335a" stroke="#16335a" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
