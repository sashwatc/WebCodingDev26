<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Close-up of the yellow lightning-bolt sticker on the navy Owala bottle">
  <defs>
    <linearGradient id="surface3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3c63"/>
      <stop offset="100%" stop-color="#0c2038"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffd43b"/>
    </radialGradient>
  </defs>
  <!-- navy bottle surface (close-up) -->
  <rect width="800" height="800" fill="url(#surface3)"/>
  <!-- subtle curvature highlight -->
  <rect x="120" y="0" width="90" height="800" fill="#ffffff" opacity="0.05"/>
  <rect x="600" y="0" width="60" height="800" fill="#000000" opacity="0.10"/>

  <!-- large lightning sticker close-up -->
  <g transform="translate(400 400)">
    <circle r="210" fill="url(#glow3)"/>
    <circle r="210" fill="none" stroke="#e9b008" stroke-width="12"/>
    <path d="M40 -120 L -74 18 L 6 18 L -40 120 L 86 -28 L 4 -28 Z"
          fill="#16335a" stroke="#16335a" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>
